version: '3.8'

services:
  backend:
    build: .
    container_name: edusmart-backend
    ports:
      - "8000:8000"
    env_file:
      - app/.env
    volumes:
      - .:/app
    restart: always
    # Using --reload for development
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
